# ─────────────────────────────────────────────────────────────────────────────
#  Skyrmion simulation — example parameter file
#  (Reichhardt 2019, PRB 99, 104418)
#
#  Lines starting with '#' or ';' are comments.
#  Keys are case-insensitive.  Only keys you want to override need to appear.
# ─────────────────────────────────────────────────────────────────────────────

[system]
nx          = 16           # skyrmions along x  (N = nx*ny)
ny          = 16           # skyrmions along y
n_sk        = 0.16          # skyrmion density → a = sqrt(sqrt(3)/(2*n_sk)), Lx = a*nx, Ly = (sqrt(3)/2)*a*ny
pbc         = true         # periodic boundary conditions

[thiele]
alpha       = 1.0          # damping coefficient α_D
g_z         = 0.791795842  # gyrovector z-component  →  Hall angle k = g_z/alpha

[skyrmion_skyrmion]
K1          = 1.0          # interaction prefactor
lambda      = 1.0          # interaction range (a_0 units)

[pinning]
n_p         = 0.2       # pin density (pins per unit area) → N_pins = round(n_p * Lx * Ly)
f_p         = 0.03          # max pin force
r_p         = 0.5          # pin radius  (a_0 units)
# pin_file  = pins.txt     # optional: explicit pin positions

[drive]
F_D         = 0.004          # uniform drive magnitude
drive_angle = 0.0          # direction in degrees  (0 = +x)

[integration]
integrator  = rk2          # euler | rk2 
dt          = 0.1
t_max       = 500.0

[init]
init_layout = triangular       # triangular | file | random
seed        = 42
# init_file = positions.txt

[output]
output_dir  = results/integrator_rk2
run_tag     = rk2_test
save_every  = 50          # steps between position snapshots
thermo_every= 1           # steps between scalar output (velocity, energy)
save_vel    = false
save_forces = false

[misc]
n_threads   = 256
verbose     = true
use_pin_cells = true
